<input
  (keydown.arrowDown)="arrowDown()"
  (keydown.arrowUp)="arrowUp()"
  (keydown.enter)="enter($event, filtered)"
  *rxLet="filteredClients$; let filtered"
  formControlName="firstName"
/>
<ul>
  <li
    (click)="select(i)"
    *ngFor="let client of filteredClients$ | push; index as i"
    [class.selected]="selectedIndex === i"
  >
    {{ client.firstName }}
  </li>
</ul>
