<section>
  <crm-appointment-edit-form
    (save)="save($event)"
    *ngIf="selected$ | async as selected; else loading"
    [entity]="selected"
  >
    {{ selected.start }}
  </crm-appointment-edit-form>
</section>

<ng-template #loading>loading...</ng-template>

<ng-container *ngIf="sub$ | async"></ng-container>
